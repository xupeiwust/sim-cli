driver: paraview
# ParaView is NOT pip-installable. Install via:
#   - conda install conda-forge::paraview
#   - Binary download from paraview.org (ships pvpython/pvbatch)
sdk_package: null

profiles:
  - name: paraview_5_13
    solver_versions: ["5.13", "5.13.0", "5.13.1"]
    active_sdk_layer: "5_13"
    active_solver_layer: "5_13"
    notes: |
      ParaView 5.13 (latest stable, 2025). Key features:
      - Python venv support for adding pip packages
      - OSMesa / EGL headless rendering
      - Improved CGNS and VTK HDF readers
      Execution: pvpython script.py (serial) or pvbatch script.py (parallel)

  - name: paraview_5_12
    solver_versions: ["5.12", "5.12.0", "5.12.1"]
    active_sdk_layer: "5_12"
    active_solver_layer: "5_12"
    notes: |
      ParaView 5.12. Stable release with full paraview.simple API.
      No Python venv support (added in 5.13).

  - name: paraview_5_4
    solver_versions: ["5.4", "5.4.1"]
    active_sdk_layer: "5_4"
    active_solver_layer: "5_4"
    notes: |
      ParaView 5.4.1 (Debian 10 package). Python 2.7 runtime.
      Data pipeline fully functional (sources, filters, IntegrateVariables).
      Rendering requires X display or OSMesa build — Debian package does NOT
      include OSMesa. No xvfb-run available on typical HPC nodes.
      E2E verified 2026-04-16 on Linux (Debian 10, pvbatch).
